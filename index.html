<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyDev Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      text-align: center;
    }

    header {
      background-color: #0077cc;
      color: white;
      padding: 20px;
    }

    .container {
      margin-top: 50px;
    }

    .card {
      background: white;
      width: 300px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    button {
      background-color: #0077cc;
      color: white;
      border: none;
      padding: 10px 20px;
      margin-top: 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #005fa3;
    }

    footer {
      margin-top: 50px;
      padding: 10px;
      background-color: #222;
      color: white;
    }
  </style>
</head>

<body>

  <header>
    <h1>Welcome Dev website</h1>
    <p>Hosted using GitHub Pages</p>
  </header>

  <div class="container">
    <div class="card">
      <h2>Hello 👋</h2>
      <p>This is a simple static website deployed directly from GitHub.</p>

      <button onclick="showMessage()">Click Me</button>

      <p id="message"></p>
    </div>
  </div>

  <footer>
    <p>© 2026 My Static Website</p>
  </footer>

  <script>
    function showMessage() {
      document.getElementById("message").innerHTML =
        "Website is working successfully!";
    }
  </script>

</body>
</html>
